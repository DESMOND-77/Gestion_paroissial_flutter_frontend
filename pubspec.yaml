name: paroisse_gest
description: Gestion Paroissiale - Parish Management Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  responsive_framework: ^1.4.0
  fl_chart: ^0.69.0
  data_table_2: ^2.5.14
  sidebarx: ^0.16.0
  go_router: ^14.3.0
  dio: ^5.7.0
  get_it: ^8.0.2
  shared_preferences: ^2.3.3
  equatable: ^2.0.5
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  auto_size_text: ^3.0.0
  flutter_secure_storage: ^10.1.0
  sqflite: ^2.3.3
  path: ^1.9.0
  connectivity_plus: ^5.0.2
  sqflite_common_ffi: ^2.4.0+3
  sqlite3_flutter_libs: ^0.5.24
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/gestparr_logo.png"
  ios: true
  background_color: "#000000"

flutter_native_splash:
  color: "#000000"
  image: assets/images/gestparr_logo.png
  android_12:
    image: assets/images/gestparr_logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lotties/
