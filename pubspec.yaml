name: paroisse_gest
description: Gestion Paroissiale - Parish Management Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  responsive_framework: ^1.4.0
  fl_chart: ^0.69.0
  data_table_2: ^2.5.14
  sidebarx: ^0.16.0
  go_router: ^14.3.0
  dio: ^5.7.0
  get_it: ^8.0.2
  shared_preferences: ^2.3.3
  equatable: ^2.0.5
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  auto_size_text: ^3.0.0
  flutter_secure_storage: ^10.1.0
  isar_plus: ^1.3.7
  isar_plus_flutter_libs: ^1.3.7
  path: ^1.9.0
  connectivity_plus: ^5.0.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  lottie: ^3.3.3
  image_picker: ^1.2.3
  path_provider: ^2.1.5
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  analyzer: ^13.0.0
  build_runner: ^2.15.1
  source_gen: ^4.2.3

# dependency_overrides:
#   meta: ^1.18.0
flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/logo.png"
  ios: true
  background_color: "#FFFFFF"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_adaptive.png"

flutter_native_splash:
  color: "#000000"
  image: assets/images/logo_adaptive.png
  android_12:
    image: assets/images/logo_adaptive.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lotties/
