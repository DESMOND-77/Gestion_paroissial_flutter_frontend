name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Annule les exécutions redondantes sur une même branche/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.6"

jobs:
  analyze:
    name: Format, analyse & tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Installer les dépendances
        run: flutter pub get

      - name: Régénérer le code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Vérifier le formatage
        run: dart format --output=none --set-exit-if-changed lib

      - name: Analyse statique
        run: flutter analyze

      - name: Tests
        run: flutter test --coverage

      - name: Publier la couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Installer les dépendances
        run: flutter pub get

      - name: Build Web (release)
        run: flutter build web --release

      - name: Archiver le build Web
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  build-android:
    name: Build APK (Android)
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Installer les dépendances
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Archiver l'APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
