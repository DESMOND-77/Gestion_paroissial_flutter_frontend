name: CodeQL

# CodeQL ne prend pas en charge le langage Dart. Ce workflow analyse donc
# le code hôte natif présent dans le projet (Kotlin/Java côté Android) qui,
# lui, est supporté. Pour le code Dart, la qualité est assurée par
# `flutter analyze` (voir ci.yml). Si du code d'un autre langage supporté
# (JavaScript/TypeScript, etc.) est ajouté, ajoutez-le à la matrice.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # tous les lundis à 06:00 UTC
  workflow_dispatch:

jobs:
  analyze:
    name: Analyse CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialiser CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Analyse CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
